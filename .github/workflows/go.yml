# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main", "feature/**", "copilot/**", "dependabot/**", "**-macos" ]
  pull_request:
    branches: [ "main", "feature/**", "copilot/**", "dependabot/**", "**-macos" ]


jobs:

  publish_config:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.config.outputs.enabled }}
    steps:
      - name: Set publish flag
        id: config
        run: echo "enabled=false" >> $GITHUB_OUTPUT  # Change to 'false' to disable publishing

  verify_test_script:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m venv .venv
        .venv/bin/pip install flask cryptography
      shell: bash

    - name: Verify test script
      run: pwsh -File test_curl.ps1 curl

  build_and_test:
    needs: verify_test_script
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            binary: ./kemforge
            pip: .venv/bin/pip
          - os: windows-latest
            binary: ./kemforge.exe
            pip: .\.venv\Scripts\pip
          - os: macos-latest
            binary: ./kemforge
            pip: .venv/bin/pip
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v5
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')

    - name: Set up Go
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Set up Python
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      run: |
        python -m venv .venv
        ${{ matrix.pip }} install flask cryptography
      shell: pwsh

    - name: Build
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      run: go build -v .

    - name: Test application
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      run: pwsh -File test_curl.ps1 ${{ matrix.binary }}

    - name: Run application
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      run: ${{ matrix.binary }} -I https://www.google.com

  verify_install:
    needs: [verify_test_script, build_and_test]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Set up Go
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Install kemforge via go install
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      run: go install github.com/ConnectingApps/kemforge@${{ github.event.pull_request.head.sha || github.sha }}

    - name: Add Go bin to PATH (Linux/macOS)
      if: matrix.os != 'windows-latest' && (matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos'))
      run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Add Go bin to PATH (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        $GoBin = go env GOBIN
        $GoPath = go env GOPATH
        $BinPath = if ($GoBin) { $GoBin } else { "$GoPath\bin" }
        [Environment]::SetEnvironmentVariable("Path", $env:Path + ";$BinPath", "User")
        echo "$BinPath" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
      shell: pwsh

    - name: Run kemforge
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      run: kemforge -I https://www.google.com

  build_installer:
    needs: [verify_install]
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Build Windows binary
      shell: pwsh
      run: |
        $env:GOOS = "windows"
        $env:GOARCH = "amd64"
        go build -v -o kemforge.exe .

    - name: Create MSIX package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path packaging/Assets

        Copy-Item kemforge.exe packaging/kemforge.exe

        Add-Type -AssemblyName System.Drawing
        foreach ($size in @(44, 150)) {
          $bmp = New-Object System.Drawing.Bitmap $size, $size
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.Clear([System.Drawing.Color]::Transparent)
          $g.Dispose()
          $bmp.Save("packaging/Assets/icon${size}x${size}.png", [System.Drawing.Imaging.ImageFormat]::Png)
          $bmp.Dispose()
        }

        $bmp = New-Object System.Drawing.Bitmap 50, 50
        $g = [System.Drawing.Graphics]::FromImage($bmp)
        $g.Clear([System.Drawing.Color]::Transparent)
        $g.Dispose()
        $bmp.Save("packaging/Assets/StoreLogo.png", [System.Drawing.Imaging.ImageFormat]::Png)
        $bmp.Dispose()

        $manifest = @'
        <?xml version="1.0" encoding="utf-8"?>
        <Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"
                 xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"
                 xmlns:uap3="http://schemas.microsoft.com/appx/manifest/uap/windows10/3"
                 xmlns:desktop="http://schemas.microsoft.com/appx/manifest/desktop/windows10"
                 xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities"
                 IgnorableNamespaces="uap uap3 desktop rescap">
          <Identity Name="ConnectingApps.KemForge"
                    Publisher="CN=Connecting Apps, O=Connecting Apps, STREET=Wagenstraat 83 D, L=Den Haag, S=Zuid-Holland, C=NL, PostalCode=2512AR"
                    Version="1.3.2.0"
                    ProcessorArchitecture="x64" />
          <Properties>
            <DisplayName>KemForge</DisplayName>
            <PublisherDisplayName>ConnectingApps</PublisherDisplayName>
            <Description>A curl-compatible CLI tool with Post-Quantum Cryptography support</Description>
            <Logo>Assets\StoreLogo.png</Logo>
          </Properties>
          <Resources>
            <Resource Language="en-us" />
          </Resources>
          <Dependencies>
            <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.22621.0" />
          </Dependencies>
          <Applications>
            <Application Id="KemForge" Executable="kemforge.exe" EntryPoint="Windows.FullTrustApplication">
              <uap:VisualElements DisplayName="KemForge"
                                  Description="KemForge CLI"
                                  BackgroundColor="transparent"
                                  Square150x150Logo="Assets\icon150x150.png"
                                  Square44x44Logo="Assets\icon44x44.png" />
              <Extensions>
                <uap3:Extension Category="windows.appExecutionAlias">
                  <uap3:AppExecutionAlias>
                    <desktop:ExecutionAlias Alias="kemforge.exe" />
                  </uap3:AppExecutionAlias>
                </uap3:Extension>
              </Extensions>
            </Application>
          </Applications>
          <Capabilities>
            <rescap:Capability Name="runFullTrust" />
          </Capabilities>
        </Package>
        '@
        $manifest | Set-Content -Path packaging/AppxManifest.xml -Encoding utf8

        $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\makeappx.exe" |
          Sort-Object FullName -Descending | Select-Object -First 1
        & $makeappx.FullName pack /d packaging /p kemforge.msix /o

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Sign installer with Azure Trusted Signing
      uses: azure/trusted-signing-action@v0.5.0
      with:
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
        endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
        trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
        certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}
        files-folder: ${{ github.workspace }}
        files-folder-filter: msix
        file-digest: SHA256
        timestamp-rfc3161: http://timestamp.acs.microsoft.com
        timestamp-digest: SHA256

    - name: Remove unsigned executable
      shell: pwsh
      run: Remove-Item kemforge.exe

    - name: Install signed MSIX package
      shell: pwsh
      run: Add-AppxPackage -Path kemforge.msix

    - name: Validate installation
      shell: pwsh
      run: kemforge --help

    - name: Upload signed installer
      uses: actions/upload-artifact@v6
      with:
        name: kemforge-installer-signed
        path: kemforge.msix

  chocobuild:
    needs: [verify_install, publish_config]
    if: needs.publish_config.outputs.enabled == 'true' && github.ref_name == 'main'
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'


    - name: Build Windows binary
      shell: pwsh
      run: |
        $env:GOOS = "windows"
        $env:GOARCH = "amd64"
        go build -v -o kemforge.exe .

    - name: Create Chocolatey package structure
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path kemforge/tools
        Copy-Item kemforge.exe kemforge/tools/kemforge.exe

    - name: Generate nuspec file
      shell: pwsh
      run: |
        $lines = @(
          '<?xml version="1.0" encoding="utf-8"?>',
          '<package xmlns="http://schemas.microsoft.com/packaging/2015/06/nuspec.xsd">',
          '  <metadata>',
          '    <id>kemforge</id>',
          '    <version>1.3.2</version>',
          '    <title>KemForge</title>',
          '    <authors>Daan Acohen</authors>',
          '    <projectUrl>https://github.com/ConnectingApps/kemforge</projectUrl>',
          '    <licenseUrl>https://github.com/ConnectingApps/kemforge/blob/main/LICENSE</licenseUrl>',
          '    <tags>curl http https post-quantum cryptography pqc ml-kem kyber</tags>',
          '    <summary>A curl-compatible CLI tool with built-in Post-Quantum Cryptography (PQC) support.</summary>',
          '    <description>KemForge is a modern, curl-compatible CLI tool for making web requests, built from the ground up with Post-Quantum Cryptography (PQC) support. It is the security-first successor to curl, designed to address the primary threat of the modern era: quantum attacks. No dependency on system TLS libraries — PQC works out of the box on every platform.</description>',
          '    <releaseNotes>https://github.com/ConnectingApps/kemforge/releases</releaseNotes>',
          '    <packageSourceUrl>https://github.com/ConnectingApps/kemforge</packageSourceUrl>',
          '  </metadata>',
          '</package>'
        )
        $lines | Set-Content -Path kemforge/kemforge.nuspec -Encoding utf8

    - name: Create chocolateyInstall.ps1
      shell: pwsh
      run: |
        $lines = @(
          '$toolsDir = Split-Path -parent $MyInvocation.MyCommand.Definition',
          'Install-BinFile -Name ''kemforge'' -Path "$toolsDir\kemforge.exe"'
        )
        $lines | Set-Content -Path kemforge/tools/chocolateyInstall.ps1 -Encoding utf8

    - name: Create chocolateyUninstall.ps1
      shell: pwsh
      run: |
        $lines = @(
          'Uninstall-BinFile -Name ''kemforge'''
        )
        $lines | Set-Content -Path kemforge/tools/chocolateyUninstall.ps1 -Encoding utf8

    - name: Create LICENSE.txt
      shell: pwsh
      run: |
        $lines = @(
          'GNU General Public License v3.0',
          '',
          'KemForge is licensed under the GNU General Public License v3.0.',
          'Full license text: https://github.com/ConnectingApps/kemforge/blob/main/LICENSE'
        )
        $lines | Set-Content -Path kemforge/tools/LICENSE.txt -Encoding utf8

    - name: Create VERIFICATION.txt
      shell: pwsh
      run: |
        $sha = '${{ github.sha }}'
        $lines = @(
          'VERIFICATION',
          '',
          'This package was built from source. The binary (kemforge.exe) was NOT downloaded',
          'from an external URL — it was compiled directly from the repository source code.',
          '',
          "Repository : https://github.com/ConnectingApps/kemforge",
          "Commit SHA : $sha",
          'Build command: go build -o kemforge.exe .',
          '',
          'To verify, clone the repository at the above commit and run the build command.',
          'The resulting kemforge.exe should match the one included in this package.'
        )
        $lines | Set-Content -Path kemforge/tools/VERIFICATION.txt -Encoding utf8


    - name: Pack Chocolatey package
      shell: pwsh
      run: |
        Set-Location kemforge
        choco pack

    - name: Install Chocolatey package
      shell: pwsh
      run: |
        Set-Location kemforge
        choco install kemforge --source . -y

    - name: Verify kemforge installation
      shell: pwsh
      run: kemforge -I https://www.google.com

    - name: Upload Chocolatey package artifact
      uses: actions/upload-artifact@v6
      with:
        name: choco-package
        path: kemforge/kemforge.*.nupkg

  deploychoco:
    needs: [chocobuild, publish_config]
    if: needs.publish_config.outputs.enabled == 'true' && github.ref_name == 'main'
    runs-on: windows-latest
    environment: chocolatey
    steps:
    - name: Download Chocolatey package artifact
      uses: actions/download-artifact@v4
      with:
        name: choco-package

    - name: Push Chocolatey package
      shell: pwsh
      env:
        CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
      run: |
        $pkg = (Get-Item *.nupkg).FullName
        choco push $pkg --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY

  release_windows:
    needs: [verify_install, publish_config]
    if: needs.publish_config.outputs.enabled == 'true' && github.ref_name == 'main'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Build Windows binary
      shell: pwsh
      run: |
        $env:GOOS = "windows"
        $env:GOARCH = "amd64"
        go build -v -o kemforge.exe .

    - name: Create zip
      shell: pwsh
      run: Compress-Archive -Path kemforge.exe -DestinationPath kemforge.zip

    - name: Compute SHA256
      shell: pwsh
      run: |
        $hash = (Get-FileHash kemforge.zip -Algorithm SHA256).Hash
        Write-Output "SHA256: $hash"

    - name: Create GitHub Release
      id: release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.3.2
        name: v1.3.2
        files: kemforge.zip
        token: ${{ github.token }}

    - name: Echo asset download URL
      shell: pwsh
      run: |
        $assets = '${{ steps.release.outputs.assets }}' | ConvertFrom-Json
        Write-Output "Download URL: $($assets[0].browser_download_url)"

  build_snap:
    needs: [verify_install]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Install snapcraft
      run: sudo snap install snapcraft --classic

    - name: Build snap
      run: sudo snapcraft pack --destructive-mode

    - name: Install snap
      run: sudo snap install --dangerous ./kemforge_*.snap

    - name: Smoke test snap
      run: /snap/bin/kemforge -I https://www.google.com

    - name: Upload snap artifact
      uses: actions/upload-artifact@v6
      with:
        name: snap-package
        path: kemforge_*.snap

  publish_snap:
    needs: [build_snap, publish_config]
    if: needs.publish_config.outputs.enabled == 'true' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
    - name: Download snap artifact
      uses: actions/download-artifact@v4
      with:
        name: snap-package

    - name: Resolve snap filename
      id: find_snap
      run: echo "snap=$(ls kemforge_*.snap)" >> $GITHUB_OUTPUT

    - name: Publish snap to Snap Store
      uses: snapcore/action-publish@v1
      env:
        SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
      with:
        snap: ${{ steps.find_snap.outputs.snap }}
        release: edge
