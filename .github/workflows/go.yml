# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main", "feature/**", "copilot/**", "dependabot/**", "**-macos" ]
  pull_request:
    branches: [ "main", "feature/**", "copilot/**", "dependabot/**", "**-macos" ]

jobs:

  verify_test_script:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m venv .venv
        .venv/bin/pip install flask cryptography
      shell: bash

    - name: Verify test script
      run: pwsh -File test_curl.ps1 curl

  build_and_test:
    needs: verify_test_script
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            binary: ./kemforge
            pip: .venv/bin/pip
          - os: windows-latest
            binary: ./kemforge.exe
            pip: .\.venv\Scripts\pip
          - os: macos-latest
            binary: ./kemforge
            pip: .venv/bin/pip
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v5
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')

    - name: Set up Go
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Set up Python
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      run: |
        python -m venv .venv
        ${{ matrix.pip }} install flask cryptography
      shell: pwsh

    - name: Build
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      run: go build -v .

    - name: Test application
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      run: pwsh -File test_curl.ps1 ${{ matrix.binary }}

    - name: Run application
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      run: ${{ matrix.binary }} -I https://www.google.com

  verify_install:
    needs: [verify_test_script, build_and_test]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Set up Go
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Install kemforge via go install
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      run: go install github.com/ConnectingApps/kemforge@${{ github.sha }}

    - name: Add Go bin to PATH (Linux/macOS)
      if: matrix.os != 'windows-latest' && (matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos'))
      run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Add Go bin to PATH (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        $GoBin = go env GOBIN
        $GoPath = go env GOPATH
        $BinPath = if ($GoBin) { $GoBin } else { "$GoPath\bin" }
        [Environment]::SetEnvironmentVariable("Path", $env:Path + ";$BinPath", "User")
        echo "$BinPath" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
      shell: pwsh

    - name: Run kemforge
      if: matrix.os != 'macos-latest' || github.ref_name == 'main' || endsWith(github.ref_name, '-macos') || endsWith(github.head_ref, '-macos')
      run: kemforge -I https://www.google.com

  build_snap:
    needs: [verify_install]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Install snapcraft
      run: sudo snap install snapcraft --classic

    - name: Build snap
      run: snapcraft pack --destructive-mode

    - name: Install snap
      run: sudo snap install --dangerous ./kemforge_*.snap

    - name: Smoke test snap
      run: /snap/bin/kemforge -I https://www.google.com

